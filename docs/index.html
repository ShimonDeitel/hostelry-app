<!doctype html>
<html><head><meta charset="utf-8"><title>Hostelry</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { background:#1A120B; color:#f0f0f0; font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif; margin:0; display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; }
.wrap { max-width:560px; padding:40px; }
h1 { color:#B5651D; font-size:2.4em; margin-bottom:0.2em; }
p.tagline { font-size:1.2em; color:#ccc; }
.feature { margin-top:2em; padding:20px; border:1px solid #B5651D55; border-radius:14px; }
a { color:#B5651D; }
footer { margin-top:3em; font-size:0.8em; color:#888; }

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #B5651D55 0%, #B5651D00 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style></head>
<body>
<div class="orb"></div>
<div class="wrap">
<h1>Hostelry</h1>
<p class="tagline">Keep a private log of every hostel and hotel you've stayed in with ratings and notes.</p>
<div class="feature">
<strong>Free:</strong> Log one stay with name, dates, and rating<br>
<strong>Pro:</strong> Unlimited stays, photo attachments, and price-per-night stats
</div>
<footer>
<a href="privacy.html">Privacy Policy</a> &middot; <a href="terms.html">Terms of Service</a><br>
Contact: s0533495227@gmail.com
</footer>
</div>
</body></html>
