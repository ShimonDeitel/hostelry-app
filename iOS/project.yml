name: Hostelry
options:
  bundleIdPrefix: com.shimondeitel.hosteltrack
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Hostelry:
    type: application
    platform: iOS
    sources:
      - path: Hostelry
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.hosteltrack
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Hostelry/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  HostelryTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: HostelryTests
      - path: Hostelry.storekit
    dependencies:
      - target: Hostelry
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.hosteltrack.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  HostelryUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: HostelryUITests
    dependencies:
      - target: Hostelry
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.hosteltrack.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Hostelry:
    build:
      targets:
        Hostelry: all
        HostelryTests: [test]
        HostelryUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Hostelry.storekit
    test:
      config: Debug
      storeKitConfiguration: Hostelry.storekit
      targets:
        - HostelryTests
        - HostelryUITests
    archive:
      config: Release
